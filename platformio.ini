[platformio]
default_envs = esp32s3-usb-hid

[env:esp32s3-usb-hid]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSB_MANUFACTURER='"Local"'
  -DUSB_PRODUCT='"ESP32-S3 Keyboard Mouse HID"'
