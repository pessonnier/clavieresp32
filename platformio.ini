[platformio]
default_envs = esp32s3-usb-hid

[env:esp32s3-usb-hid]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D USB_MANUFACTURER=\"Local\"
  -D USB_PRODUCT=\"ESP32-S3 Keyboard Mouse HID\"
